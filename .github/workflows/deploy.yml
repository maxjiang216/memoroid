name: Build and Deploy to Vercel

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]   # PRs to main get a build check; blocks bad merges
  workflow_dispatch:

# One run per ref at a time; newer push cancels an in-flight one.
concurrency:
  group: vercel-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  ALLEGRO_TAG: "5.2.10.1"

jobs:
  # ── Build ─────────────────────────────────────────────────────────────────
  # Runs on every push and every PR targeting main.
  # A failed build blocks the PR from merging (enable branch protection in
  # GitHub → Settings → Branches → Require status checks → "build").
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      # ── Emscripten ──────────────────────────────────────────────────────
      - name: Set up Emscripten
        uses: mymindstorm/setup-emscripten@v14
        with:
          version: latest
          actions-cache-folder: emsdk-cache

      - name: Record emcc version (for cache key)
        id: emcc-ver
        run: echo "ver=$(emcc -dumpversion)" >> "$GITHUB_OUTPUT"

      # Pre-build the SDL2 and FreeType Emscripten ports so their headers and
      # static libs land in the emsdk sysroot before cmake runs.
      # This must happen before the Allegro cmake step even on cache hits,
      # because embuilder populates emsdk's own cache (not allegro5-src).
      - name: Pre-build Emscripten SDL2 and FreeType ports
        run: embuilder build sdl2 freetype

      # ── Allegro for Emscripten (cached) ─────────────────────────────────
      # Cache key includes the allegro tag, emcc version, and a manual bump
      # suffix (-v2) to invalidate the broken cache from the first CI run.
      - name: Restore Allegro WASM build cache
        id: cache-allegro
        uses: actions/cache@v4
        with:
          path: allegro5-src
          key: allegro-${{ env.ALLEGRO_TAG }}-emcc-${{ steps.emcc-ver.outputs.ver }}-v2

      - name: Clone Allegro source
        if: steps.cache-allegro.outputs.cache-hit != 'true'
        run: |
          git clone --branch "$ALLEGRO_TAG" --depth 1 \
            https://github.com/liballeg/allegro5.git allegro5-src

      - name: Build Allegro for Emscripten
        if: steps.cache-allegro.outputs.cache-hit != 'true'
        run: |
          # Locate SDL2 and FreeType in the emsdk sysroot (populated above by embuilder).
          EMCACHE=$(em-config CACHE)
          SDL2_INC="${EMCACHE}/sysroot/include"
          SDL2_LIB="${EMCACHE}/sysroot/lib/wasm32-emscripten/libSDL2.a"
          FT_INC="${EMCACHE}/sysroot/include/freetype2"
          FT_LIB="${EMCACHE}/sysroot/lib/wasm32-emscripten/libfreetype.a"

          emcmake cmake -S allegro5-src -B allegro5-src/build-wasm \
            -DCMAKE_BUILD_TYPE=Release \
            -DALLEGRO_SDL=ON \
            -DSDL2_INCLUDE_DIR="${SDL2_INC}" \
            -DSDL2_LIBRARY="${SDL2_LIB}" \
            -DFREETYPE_INCLUDE_DIRS="${FT_INC}" \
            -DFREETYPE_LIBRARY="${FT_LIB}" \
            -DWANT_MONOLITH=ON \
            -DWANT_TTF=ON \
            -DWANT_IMAGE=ON \
            -DWANT_PRIMITIVES=ON \
            -DWANT_FONT=ON \
            -DWANT_NATIVE_DIALOG=OFF \
            -DWANT_AUDIO=OFF \
            -DWANT_ACODEC=OFF \
            -DWANT_SHADERS_GL=OFF \
            -DWANT_EXAMPLES=OFF \
            -DWANT_TESTS=OFF \
            -DWANT_DOCS=OFF

          cmake --build allegro5-src/build-wasm -j$(nproc)

      # ── Build the game ───────────────────────────────────────────────────
      - name: Build memoroid.wasm
        run: |
          ALLEGRO_INCLUDE=allegro5-src/include \
          ALLEGRO_LIB=allegro5-src/build-wasm/lib \
          OUT_DIR=public \
          bash build-web.sh

      # Pass the built web files to the deploy job without re-running the build.
      - name: Upload web artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: public/
          retention-days: 1

  # ── Deploy ────────────────────────────────────────────────────────────────
  # Runs only when the build succeeds on a push to main (not on PRs).
  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Download web artifacts
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: public/

      # Required GitHub secrets (Settings → Secrets and variables → Actions):
      #   VERCEL_TOKEN      — create at https://vercel.com/account/tokens
      #   VERCEL_ORG_ID     — your Vercel account/team ID (see note below)
      #   VERCEL_PROJECT_ID — the project ID (see note below)
      #
      # How to get VERCEL_ORG_ID and VERCEL_PROJECT_ID:
      #   1. Install Vercel CLI locally:  npm i -g vercel
      #   2. Run inside this repo:        vercel link
      #   3. Open .vercel/project.json — the two IDs are there.
      #   (You can delete .vercel/ afterwards; don't commit it.)
      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: npx vercel@latest --token "$VERCEL_TOKEN" --prod --yes
