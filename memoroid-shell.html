<!DOCTYPE html>
<!--
  Custom Emscripten HTML shell for Memoroid.
  Derived from Emscripten's shell_minimal.html (MIT licence, Emscripten Authors).
  Changes: removed default toolbar/logo/console chrome; added fullscreen-fit
  layout so the 1600x900 canvas scales to fill any window without scrollbars;
  footer with link to the GitHub repository.
-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Memoroid</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      display: flex;
      flex-direction: column;
    }

    /* Game area above the footer; canvas scales inside this region. */
    #main-stage {
      position: relative;
      flex: 1;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
    }

    #game-container {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* The canvas must have no border or padding — Emscripten/SDL use its
       CSS size to remap pointer/touch coordinates back to internal resolution. */
    canvas#canvas {
      display: block;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    /* Loading overlay — shown while the WASM downloads, then hidden. */
    #loader {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #000;
      color: #fff;
      font-family: sans-serif;
      font-size: 14px;
      gap: 12px;
      z-index: 10;
      transition: opacity 0.3s;
    }
    #loader.hidden { opacity: 0; pointer-events: none; }

    #spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    progress#progress {
      width: 200px;
      accent-color: #fff;
    }

    #site-footer {
      flex-shrink: 0;
      width: 100%;
      text-align: center;
      padding: 6px 8px 10px;
      font-family: sans-serif;
      font-size: 13px;
      line-height: 1.4;
      border-top: 1px solid rgba(255,255,255,0.12);
      background: rgba(0,0,0,0.92);
    }
    #site-footer a {
      color: rgba(255,255,255,0.72);
      text-decoration: none;
    }
    #site-footer a:hover { color: #fff; text-decoration: underline; }

    /* Bottom-right of the game area only (stays above the footer link row) */
    #fs-btn {
      position: absolute;
      bottom: 12px;
      right: 12px;
      z-index: 20;
      padding: 6px 12px;
      background: rgba(255,255,255,0.12);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 5px;
      cursor: pointer;
      font-size: 13px;
      backdrop-filter: blur(4px);
      transition: background 0.2s;
    }
    #fs-btn:hover { background: rgba(255,255,255,0.25); }
  </style>
</head>
<body>
  <div id="loader">
    <div id="spinner"></div>
    <progress id="progress" value="0" max="100" hidden></progress>
    <span id="status">Downloading…</span>
  </div>

  <div id="main-stage">
    <div id="game-container">
      <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>
    </div>
    <button id="fs-btn" type="button" title="Toggle fullscreen">&#x26F6; Fullscreen</button>
  </div>

  <footer id="site-footer">
    <a href="https://github.com/maxjiang216/memoroid" target="_blank" rel="noopener noreferrer">Source on GitHub</a>
  </footer>

  <script>
    // ── Fullscreen ──────────────────────────────────────────────────────────
    var fsbtn = document.getElementById('fs-btn');
    fsbtn.addEventListener('click', function () {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen && document.documentElement.requestFullscreen();
      } else {
        document.exitFullscreen && document.exitFullscreen();
      }
    });

    // ── Responsive scaling ──────────────────────────────────────────────────
    // GAME_W / GAME_H must match SW / SH in main.cpp.
    var GAME_W = 1600;
    var GAME_H = 900;

    function availableViewport() {
      var footer = document.getElementById('site-footer');
      var fh = footer ? footer.offsetHeight : 0;
      return {
        w: window.innerWidth,
        h: Math.max(0, window.innerHeight - fh)
      };
    }

    function resizeCanvas() {
      var canvas = document.getElementById('canvas');
      if (!canvas) return;
      var vp = availableViewport();
      var scale = Math.min(vp.w / GAME_W, vp.h / GAME_H);
      canvas.style.width  = Math.floor(GAME_W * scale) + 'px';
      canvas.style.height = Math.floor(GAME_H * scale) + 'px';
    }

    window.addEventListener('resize', resizeCanvas);
    window.addEventListener('orientationchange', resizeCanvas);
    document.addEventListener('fullscreenchange', resizeCanvas);

    // Run immediately once the canvas exists, and again after Emscripten init.
    resizeCanvas();
    window.addEventListener('load', function () {
      resizeCanvas();
      requestAnimationFrame(resizeCanvas);
      setTimeout(resizeCanvas, 500);
    });

    // ── Emscripten Module configuration ────────────────────────────────────
    var statusElement  = document.getElementById('status');
    var progressElement = document.getElementById('progress');
    var spinnerElement  = document.getElementById('spinner');
    var loaderElement   = document.getElementById('loader');
    var canvasElement   = document.getElementById('canvas');

    canvasElement.addEventListener('webglcontextlost', function (e) {
      alert('WebGL context lost. Please reload the page.');
      e.preventDefault();
    }, false);

    var setStatus = function (text) {
      if (!setStatus.last) setStatus.last = { time: Date.now(), text: '' };
      if (text === setStatus.last.text) return;
      var m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
      var now = Date.now();
      if (m && now - setStatus.last.time < 30) return;
      setStatus.last.time = now;
      setStatus.last.text = text;
      if (m) {
        text = m[1];
        progressElement.value = parseInt(m[2]) * 100;
        progressElement.max   = parseInt(m[4]) * 100;
        progressElement.hidden = false;
        spinnerElement.hidden  = false;
      } else {
        progressElement.value = null;
        progressElement.max   = null;
        progressElement.hidden = true;
        if (!text) {
          spinnerElement.style.display = 'none';
          loaderElement.classList.add('hidden');
          setTimeout(function () { loaderElement.style.display = 'none'; }, 350);
        }
      }
      statusElement.innerHTML = text;
    };

    var Module = {
      canvas: canvasElement,
      setStatus: setStatus,
      totalDependencies: 0,
      monitorRunDependencies: function (left) {
        this.totalDependencies = Math.max(this.totalDependencies, left);
        setStatus(left
          ? 'Preparing… (' + (this.totalDependencies - left) + '/' + this.totalDependencies + ')'
          : 'All downloads complete.');
      },
      onRuntimeInitialized: function () {
        resizeCanvas();
      }
    };

    setStatus('Downloading…');

    window.onerror = function () {
      setStatus('Exception thrown, see JavaScript console');
      spinnerElement.style.display = 'none';
      setStatus = function (text) {
        if (text) console.error('[post-exception status] ' + text);
      };
    };
  </script>

  {{{ SCRIPT }}}
</body>
</html>
